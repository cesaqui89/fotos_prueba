<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Quiniela - TIS</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root {
            --bg-principal: #0f172a;
            --bg-card: #1e293b;
            --texto: #f8fafc;
            --borde-grafico: rgba(255,255,255,0.1);
            --btn-bg: #334155;
            --btn-texto: #f8fafc;
            --primary: #3498db;
            --accent: #2ecc71;
        }

        [data-theme="light"] {
            --bg-principal: #f4f6f8;
            --bg-card: #ffffff;
            --texto: #2c3e50;
            --borde-grafico: rgba(0,0,0,0.1);
            --btn-bg: #e2e8f0;
            --btn-texto: #1a202c;
        }

        body {
            background-color: var(--bg-principal);
            color: var(--texto);
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            padding: 15px;
            transition: background-color 0.3s, color 0.3s;
        }

        .dashboard-container {
            width: 100%;
            box-sizing: border-box;
            background: var(--bg-card);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }

        .header-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .header-controls h2 { margin: 0; font-size: 1.5rem; }

        .controles-izquierda {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .selector-comparar {
            display: flex;
            gap: 10px;
            align-items: center;
            background: rgba(255,255,255,0.05);
            padding: 8px 12px;
            border-radius: 8px;
        }
        
        [data-theme="light"] .selector-comparar { background: rgba(0,0,0,0.03); }

        select {
            padding: 6px 12px;
            border-radius: 6px;
            border: 1px solid #cbd5e1;
            background: var(--bg-card);
            color: var(--texto);
        }

        button {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            background-color: var(--btn-bg);
            color: var(--btn-texto);
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
        }
        button:hover { opacity: 0.9; }

        .chart-scroll-container {
            width: 100%;
            overflow-x: auto;
            margin-top: 15px;
            -webkit-overflow-scrolling: touch;
        }

        .chart-wrapper {
            position: relative;
            min-width: 1100px;
            height: 500px;
        }

        .filtros-usuarios {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-bottom: 15px;
            padding: 10px;
            background: rgba(255,255,255,0.02);
            border-radius: 8px;
            max-height: 110px;
            overflow-y: auto;
        }
        
        [data-theme="light"] .filtros-usuarios { background: rgba(0,0,0,0.01); }

        .filtros-usuarios button { font-size: 0.8rem; padding: 4px 8px; }

        /* 📱 PANEL DE DETALLES PARA MÓVILES (Info Card) */
        .mobile-details-card {
            margin-top: 15px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.04);
            border-left: 4px solid var(--primary);
            border-radius: 0 8px 8px 0;
            display: block; /* Visible para servir como guía o feedback de toques */
        }
        
        [data-theme="light"] .mobile-details-card {
            background: rgba(0, 0, 0, 0.02);
        }

        .mobile-details-card h4 { margin: 0 0 8px 0; color: var(--primary); font-size: 1.1rem;}
        .mobile-details-card p { margin: 5px 0; font-size: 0.95rem; line-height: 1.4; }
        .hint-text { font-style: italic; color: #94a3b8; font-size: 0.85rem; }

        @media (max-width: 768px) {
            body { padding: 8px; }
            .dashboard-container { padding: 12px; border-radius: 8px; }
            .header-controls { flex-direction: column; align-items: stretch; gap: 12px; }
            .header-controls h2 { text-align: center; font-size: 1.25rem; }
            .controles-izquierda { flex-direction: column; align-items: stretch; width: 100%; gap: 8px; }
            .controles-izquierda button { width: 100%; text-align: center; }
            .selector-comparar { flex-direction: column; width: 100%; box-sizing: border-box; padding: 10px; gap: 8px; }
            .selector-comparar select { width: 100%; }
            #theme-toggle { width: 100%; }
            .chart-wrapper { height: 380px; }
            .filtros-usuarios { max-height: 140px; }
        }
    </style>
</head>
<body>

<div class="dashboard-container">
    <div class="header-controls">
        <h2>📈 Evolución de Puntos Acumulados - TIS</h2>
        
        <div class="controles-izquierda">
            <button onclick="mostrarTodos()" style="background: var(--primary); color: white;">🌐 Ver Todos</button>
            
            <div class="selector-comparar">
                <span>👥 <b>Modo Versus:</b></span>
                <select id="user1" onchange="actualizarModoVersus()"></select>
                <span>vs</span>
                <select id="user2" onchange="actualizarModoVersus()"></select>
            </div>
        </div>

        <button id="theme-toggle" onclick="toggleTema()">🌓 Tema</button>
    </div>

    <div class="filtros-usuarios" id="zona-filtros"></div>

    <div class="chart-scroll-container">
        <div class="chart-wrapper">
            <canvas id="quinielaChart"></canvas>
        </div>
    </div>

    <div class="mobile-details-card" id="panel-movil">
        <h4>ℹ️ Visor de Partidos </h4>
        <p id="txt-partido" class="hint-text">Toca cualquier punto o intersección en la gráfica para ver los detalles del partido aquí.</p>
        <p id="txt-fecha"></p>
        <p id="txt-detalles-usuarios"></p>
    </div>
</div>

<script src="datosQuiniela.js"></script>

<script>
    let miGrafico;
    let totalParticipantes = 0;
    
    function generarColor(index) {
        return `hsla(${(index * 360 / totalParticipantes)}, 75%, 55%, 1)`;
    }

    function inicializarGrafico() {
        const ctx = document.getElementById('quinielaChart').getContext('2d');
        
        quinielaData.sort((a, b) => a.usuario.localeCompare(b.usuario));
        totalParticipantes = quinielaData.length;

        const partidosBase = quinielaData[0].games;
        const labels = partidosBase.map((_, idx) => `P${idx + 1}`);

        const datasets = quinielaData.map((participante, idx) => {
            let puntosAcumulados = 0;
            
            const dataProgresiva = participante.games.map(game => {
                if (game.gameBet && typeof game.gameBet.gainedPoints === 'number') {
                    puntosAcumulados += game.gameBet.gainedPoints;
                }
                return puntosAcumulados;
            });

            return {
                label: participante.usuario.replace(/_/g, ' '),
                data: dataProgresiva,
                borderColor: generarColor(idx),
                backgroundColor: generarColor(idx),
                borderWidth: 2,
                pointRadius: 3, // Un poquito más grande para facilitar el toque en pantallas táctiles
                hitRadius: 10,   // Área magnética extendida para que el dedo acierte con facilidad
                tension: 0.1,
                hidden: false
            };
        });

        const colorTexto = '#f8fafc';
        const colorRejilla = 'rgba(255,255,255,0.1)';

        miGrafico = new Chart(ctx, {
            type: 'line',
            data: { labels, datasets },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                // Al hacer clic o tocar, disparamos la tarjeta alternativa de datos
                onClick: (e, elementos) => {
                    if (elementos.length > 0) {
                        const indexPartido = elementos[0].index;
                        actualizarPanelDetallesMovil(indexPartido);
                    }
                },
                interaction: {
                    mode: 'nearest',
                    intersect: true
                },
                plugins: { 
                    legend: { display: false },
                    tooltip: {
                        enabled: true, // Sigue funcionando en escritorio perfectamente
                        callbacks: {
                            title: function(context) {
                                const indexPartido = context[0].dataIndex;
                                const juego = quinielaData[0].games[indexPartido];
                                if (juego && juego.competitors.length >= 2) {
                                    return `⚽ ${juego.competitors[0].name} ${juego.scores ? juego.scores.team1 : '-'} - ${juego.scores ? juego.scores.team2 : '-'} ${juego.competitors[1].name}`;
                                }
                                return `Partido ${indexPartido + 1}`;
                            },
                            afterTitle: function(context) {
                                const indexPartido = context[0].dataIndex;
                                const juego = quinielaData[0].games[indexPartido];
                                if (juego && juego.startTime) {
                                    const fecha = new Date(juego.startTime).toLocaleDateString('es-CR', {
                                        day: '2-digit', month: 'short', hour: '2-digit', minute:'2-digit'
                                    });
                                    return `📅 Fecha: ${fecha}\n----------------------------------`;
                                }
                                return '';
                            },
                            label: function(context) {
                                const idxUsuario = context.datasetIndex;
                                const idxPartido = context.dataIndex;
                                const juegoUsuario = quinielaData[idxUsuario].games[idxPartido];
                                
                                let infoApuesta = "Sin Apuesta";
                                let ptsAdquiridos = 0;

                                if (juegoUsuario && juegoUsuario.gameBet) {
                                    ptsAdquiridos = juegoUsuario.gameBet.gainedPoints;
                                    if (juegoUsuario.gameBet.selection) {
                                        infoApuesta = `Predijo: ${juegoUsuario.gameBet.selection.team1}-${juegoUsuario.gameBet.selection.team2}`;
                                    }
                                }
                                return `👤 ${context.dataset.label}: ${context.parsed.y} pts (${infoApuesta} | +${ptsAdquiridos} pts)`;
                            }
                        }
                    }
                },
                scales: {
                    x: { grid: { color: colorRejilla }, ticks: { color: colorTexto } },
                    y: { grid: { color: colorRejilla }, ticks: { color: colorTexto } }
                }
            }
        });

        poblarSelectores();
        generarBotonesFiltro();
    }

    // 🛠️ FUNCIÓN MÁGICA PARA MÓVILES: Actualiza el contenedor estático de texto al tocar la gráfica
    function actualizarPanelDetallesMovil(indexPartido) {
        const juego = quinielaData[0].games[indexPartido];
        if (!juego) return;

        const local = juego.competitors[0].name;
        const visita = juego.competitors[1].name;
        const sHome = juego.scores ? juego.scores.team1 : '-';
        const sAway = juego.scores ? juego.scores.team2 : '-';
        
        const fecha = new Date(juego.startTime).toLocaleDateString('es-CR', {
            weekday: 'long', day: '2-digit', month: 'long', hour: '2-digit', minute:'2-digit'
        });

        // Título del encuentro
        document.getElementById('txt-partido').innerHTML = `<b>⚽ Resultado Real:</b> ${local} <span style="color:var(--primary)">${sHome} - ${sAway}</span> ${visita}`;
        document.getElementById('txt-partido').classList.remove('hint-text');
        document.getElementById('txt-fecha').innerHTML = `<b>📅 Horario:</b> ${fecha}`;

        // Extraer qué hicieron los usuarios activos/visibles en este momento en este partido
        let htmlUsuarios = "<b>📊 Rendimiento de los Participantes en este partido:</b><br><ul style='margin:5px 0; padding-left:20px;'>";
        
        quinielaData.forEach((usuario) => {
            const datasetDeGrafico = miGrafico.data.datasets.find(d => d.label === usuario.usuario.replace(/_/g, ' '));
            
            // Solo listamos los usuarios que están encendidos (visibles) en la gráfica
            if (datasetDeGrafico && !datasetDeGrafico.hidden) {
                const gameUser = usuario.games[indexPartido];
                let prediccion = "No registró apuesta";
                let ganados = 0;

                if (gameUser && gameUser.gameBet) {
                    ganados = gameUser.gameBet.gainedPoints;
                    if (gameUser.gameBet.selection) {
                        prediccion = `${gameUser.gameBet.selection.team1} - ${gameUser.gameBet.selection.team2}`;
                    }
                }
                
                // Calculamos los puntos que lleva acumulados justo hasta este partido
                let acumuladosHastaAqui = 0;
                for(let i = 0; i <= indexPartido; i++) {
                    if (usuario.games[i] && usuario.games[i].gameBet) {
                        acumuladosHastaAqui += usuario.games[i].gameBet.gainedPoints;
                    }
                }

                htmlUsuarios += `<li style="margin-bottom:4px;"><b>${usuario.usuario.replace(/_/g, ' ')}</b>: Predijo <code>${prediccion}</code> | Ganó <span style="color:var(--accent)">+${ganados} pts</span> (Llegó a ${acumuladosHastaAqui} pts acumulados)</li>`;
            }
        });
        
        htmlUsuarios += "</ul>";
        document.getElementById('txt-detalles-usuarios').innerHTML = htmlUsuarios;
    }

    function poblarSelectores() {
        const s1 = document.getElementById('user1');
        const s2 = document.getElementById('user2');
        s1.innerHTML = ''; s2.innerHTML = ''; 
        
        s1.options[s1.options.length] = new Option("Selecciona un usuario...", "");
        s2.options[s2.options.length] = new Option("Selecciona un usuario...", "");
        
        quinielaData.forEach((p, idx) => {
            const nombre = p.usuario.replace(/_/g, ' ');
            s1.options[s1.options.length] = new Option(nombre, idx);
            s2.options[s2.options.length] = new Option(nombre, idx);
        });
        
        s1.selectedIndex = 0;
        s2.selectedIndex = 0;
    }

    function actualizarModoVersus() {
        const val1 = document.getElementById('user1').value;
        const val2 = document.getElementById('user2').value;

        if (val1 === "" || val2 === "") {
            mostrarTodos();
            return;
        }

        const u1Index = parseInt(val1);
        const u2Index = parseInt(val2);

        miGrafico.data.datasets.forEach((dataset, idx) => {
            dataset.hidden = !(idx === u1Index || idx === u2Index);
        });

        miGrafico.update();
        sincronizarOpacidadBotones();
    }

    function mostrarTodos() {
        if(miGrafico) {
            miGrafico.data.datasets.forEach(dataset => dataset.hidden = false);
            miGrafico.update();
            sincronizarOpacidadBotones();
        }
    }

    function resetearSelectoresUI() {
        document.getElementById('user1').selectedIndex = 0;
        document.getElementById('user2').selectedIndex = 0;
    }

    function generarBotonesFiltro() {
        const contenedor = document.getElementById('zona-filtros');
        contenedor.innerHTML = '';

        miGrafico.data.datasets.forEach((dataset, idx) => {
            const btn = document.createElement('button');
            btn.innerText = dataset.label;
            btn.id = `btn-user-${idx}`;
            btn.style.borderLeft = `4px solid ${dataset.borderColor}`;
            
            btn.onclick = () => {
                miGrafico.data.datasets[idx].hidden = !miGrafico.data.datasets[idx].hidden;
                miGrafico.update();
                btn.style.opacity = miGrafico.data.datasets[idx].hidden ? '0.3' : '1';
                resetearSelectoresUI();
            };
            contenedor.appendChild(btn);
        });
    }

    function sincronizarOpacidadBotones() {
        miGrafico.data.datasets.forEach((dataset, idx) => {
            const btn = document.getElementById(`btn-user-${idx}`);
            if (btn) btn.style.opacity = dataset.hidden ? '0.3' : '1';
        });
    }

    function toggleTema() {
        const html = document.documentElement;
        const nuevoTema = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        html.setAttribute('data-theme', nuevoTema);

        const esOscuro = nuevoTema === 'dark';
        const colorTexto = esOscuro ? '#f8fafc' : '#2c3e50';
        const colorRejilla = esOscuro ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.05)';

        miGrafico.options.scales.x.ticks.color = colorTexto;
        miGrafico.options.scales.x.grid.color = colorRejilla;
        miGrafico.options.scales.y.ticks.color = colorTexto;
        miGrafico.options.scales.y.grid.color = colorRejilla;
        miGrafico.update();
    }

    window.onload = inicializarGrafico;
</script>
</body>
</html>
