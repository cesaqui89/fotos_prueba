<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Dashboard de Quiniela - Rendimiento</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        /* Variables para el cambio de Tema (Claro por defecto) */
        :root {
            --bg-principal: #f4f6f8;
            --bg-card: #ffffff;
            --texto: #2c3e50;
            --borde-grafico: #rgba(0,0,0,0.1);
            --btn-bg: #e2e8f0;
            --btn-texto: #1a202c;
        }

        /* Variables para Tema Oscuro */
        [data-theme="dark"] {
            --bg-principal: #0f172a;
            --bg-card: #1e293b;
            --texto: #f8fafc;
            --borde-grafico: rgba(255,255,255,0.1);
            --btn-bg: #334155;
            --btn-texto: #f8fafc;
        }

        body {
            background-color: var(--bg-principal);
            color: var(--texto);
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            padding: 20px;
            transition: background-color 0.3s, color 0.3s;
        }

        .dashboard-container {
            max-width: 1200px;
            margin: 0 auto;
            background: var(--bg-card);
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }

        .header-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        button {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            background-color: var(--btn-bg);
            color: var(--btn-texto);
            font-weight: 6px;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.9; }

        /* Contenedor con Scroll para mitigar la saturación de datos */
        .chart-scroll-container {
            width: 100%;
            overflow-x: auto; /* Permite scroll horizontal si el gráfico es muy ancho */
            margin-top: 15px;
        }

        .chart-wrapper {
            position: relative;
            /* Si tienes muchos partidos (ej: 60), forzamos un ancho mínimo para que respire la info */
            min-width: 1000px; 
            height: 500px;
        }

        .filtros-usuarios {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 15px;
            padding: 10px;
            background: rgba(0,0,0,0.02);
            border-radius: 8px;
        }
    </style>
</head>
<body>

<div class="dashboard-container">
    <div class="header-controls">
        <h2>📈 Evolución de Puntos Acumulados</h2>
        <div>
            <button onclick="mostrarModo('todos')">Mostrar Todos</button>
            <button onclick="mostrarModo('ninguno')">Ocultar Todos</button>
            <button id="theme-toggle" onclick="toggleTema()" style="background: #3498db; color: white;">🌓 Cambiar Tema</button>
        </div>
    </div>

    <div class="filtros-usuarios" id="zona-filtros"></div>

    <div class="chart-scroll-container">
        <div class="chart-wrapper">
            <canvas id="quinielaChart"></canvas>
        </div>
    </div>
</div>

<script src="resultados/datosQuiniela.js"></script>

<script>
    let miGrafico;
    
    // Generar una paleta de colores dinámica para los 28 participantes
    function generarColor(index) {
        return `hsla(${(index * 360 / 28)}, 70%, 55%, 1)`;
    }

    function inicializarGrafico() {
        const ctx = document.getElementById('quinielaChart').getContext('2d');
        
        // 1. Extraer las etiquetas de los ejes (Partidos o Fechas)
        // Usamos los partidos del primer participante como base de la línea de tiempo
        const partidosBase = quinielaData[0].games;
        const labels = partidosBase.map((g, idx) => `P${idx + 1}`); // P1, P2, P3...

        // 2. Procesar los datasets calculando los puntos acumulados de forma progresiva
        const datasets = quinielaData.map((participante, idx) => {
            let puntosAcumulados = 0;
            const dataProgresiva = participante.games.map(game => {
                puntosAcumulados += (game.gameBet ? game.gameBet.gainedPoints : 0);
                return puntosAcumulados;
            });

            const color = generarColor(idx);

            return {
                label: participante.usuario.replace(/_/g, ' '), // Reemplaza guiones bajos por espacios
                data: dataProgresiva,
                borderColor: color,
                backgroundColor: color,
                borderWidth: 2,
                pointRadius: 1, // Puntos pequeños para no saturar la pantalla
                pointHoverRadius: 5,
                tension: 0.1, // Curvatura ligera
                hidden: idx >= 5 // Por defecto SOLO mostramos los primeros 5 para evitar desorden visual
            };
        });

        // 3. Configuración del Chart.js adaptable a temas
        const esOscuro = document.documentElement.getAttribute('data-theme') === 'dark';
        const colorTexto = esOscuro ? '#f8fafc' : '#2c3e50';
        const colorRejilla = esOscuro ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.05)';

        miGrafico = new Chart(ctx, {
            type: 'line',
            data: { labels, datasets },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        display: false // Ocultamos la leyenda gigante de arriba, usaremos botones abajo
                    },
                    tooltip: {
                        mode: 'index',
                        intersect: false
                    }
                },
                scales: {
                    x: {
                        grid: { color: colorRejilla },
                        ticks: { color: colorTexto }
                    },
                    y: {
                        grid: { color: colorRejilla },
                        ticks: { color: colorTexto },
                        title: { display: true, text: 'Puntos Totales', color: colorTexto }
                    }
                }
            }
        });

        generarBotonesFiltro();
    }

    // Crear la botonera inferior para encender y apagar competidores
    function generarBotonesFiltro() {
        const contenedor = document.getElementById('zona-filtros');
        contenedor.innerHTML = '';

        miGrafico.data.datasets.forEach((dataset, idx) => {
            const btn = document.createElement('button');
            btn.innerText = dataset.label;
            btn.style.borderLeft = `5px solid ${dataset.borderColor}`;
            btn.style.opacity = dataset.hidden ? '0.4' : '1';
            
            btn.onclick = () => {
                const meta = miGrafico.getDatasetMeta(idx);
                meta.hidden = meta.hidden === null ? !miGrafico.data.datasets[idx].hidden : null;
                miGrafico.data.datasets[idx].hidden = !miGrafico.data.datasets[idx].hidden;
                btn.style.opacity = miGrafico.data.datasets[idx].hidden ? '0.4' : '1';
                miGrafico.update();
            };
            contenedor.appendChild(btn);
        });
    }

    // Acciones masivas (Mostrar todos / Ocultar todos)
    function mostrarModo(modo) {
        miGrafico.data.datasets.forEach((dataset) => {
            dataset.hidden = (modo === 'ninguno');
        });
        miGrafico.update();
        generarBotonesFiltro();
    }

    // Lógica de cambio de interfaz Claro / Oscuro
    function toggleTema() {
        const html = document.documentElement;
        const temaActual = html.getAttribute('data-theme');
        const nuevoTema = temaActual === 'dark' ? 'light' : 'dark';
        
        html.setAttribute('data-theme', nuevoTema);

        // Actualizamos los colores internos del gráfico sin destruir la instancia
        const esOscuro = nuevoTema === 'dark';
        const colorTexto = esOscuro ? '#f8fafc' : '#2c3e50';
        const colorRejilla = esOscuro ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.05)';

        miGrafico.options.scales.x.ticks.color = colorTexto;
        miGrafico.options.scales.x.grid.color = colorRejilla;
        miGrafico.options.scales.y.ticks.color = colorTexto;
        miGrafico.options.scales.y.grid.color = colorRejilla;
        miGrafico.options.scales.y.title.color = colorTexto;
        
        miGrafico.update();
    }

    // Inicializar al cargar la página
    window.onload = inicializarGrafico;
</script>
</body>
</html>
